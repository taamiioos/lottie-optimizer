<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./common/common.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/mp4box@0.5.2/dist/mp4box.all.min.js"></script>

    <style>
        :root {
            --cmp-card-bg:     #1a1433;
            --cmp-card-border: #4c3d8f;
            --cmp-info-bg:     #15102a;
            --cmp-metric-bg:   #1f1a3d;
            --cmp-before-clr:  #f87171;
            --cmp-after-clr:   #60a5fa;
            --cmp-compress-clr: #4ade80;
        }
        body {
            --cmp-card-bg:     #ffffff;
            --cmp-card-border: #e2e8f0;
            --cmp-info-bg:     #f8fafc;
            --cmp-metric-bg:   #f1f5f9;
            --cmp-before-clr:  #dc2626;
            --cmp-after-clr:   #2563eb;
            --cmp-compress-clr: #059669;
        }

        .cmp-btn {
            display: block;
            margin: 0 auto 32px;
            padding: 13px 32px;
            font-size: 16px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary-d));
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
            transition: opacity 0.2s, transform 0.15s;
        }
        .cmp-btn:hover  { opacity: 0.88; transform: translateY(-1px); }
        .cmp-btn:disabled {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: none;
            color: var(--text-dim);
            cursor: not-allowed;
            transform: none;
        }
        body.light .cmp-btn:disabled {
            background: #e2e8f0;
            color: var(--text-dim);
        }

        .cmp-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .cmp-viewer {
            height: 220px;
            background: #000;
        }

        .cmp-info {
            padding: 14px 16px;
            background: var(--cmp-info-bg);
            transition: background 0.25s;
        }

        .cmp-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
            color: var(--text);
        }

        .cmp-result {
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 12px;
            color: var(--text-mute);
        }

        .cmp-metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--cmp-metric-bg);
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            transition: background 0.25s;
        }

        .cmp-metric span  { opacity: 0.8; }
        .cmp-metric strong { font-weight: 600; }

        .cmp-metric.before   strong { color: var(--cmp-before-clr); }
        .cmp-metric.after    strong { color: var(--cmp-after-clr); }
        .cmp-metric.compress strong { color: var(--cmp-compress-clr); }
    </style>
</head>
<body>
<main class="app">

    <button class="cmp-btn" id="optimizeAllBtn">Оптимизировать</button>

    <div class="cmp-grid" id="grid"></div>
</main>

<script type="module">
    import { initTheme, toggleTheme } from './common/common.js';
    import { Optimizer } from '../src/optimizer.js';

    initTheme();
    window.__toggleTheme = toggleTheme;

    const files = [
        { name: "Sample 1",  path: "../samples-lottie/v1.lottie_test.json" },
        { name: "Sample 2",  path: "../samples-lottie/v2.lottie_test.json" },
        { name: "Sample 3",  path: "../samples-lottie/v3.lottie_test.json" },
        { name: "Sample 4",  path: "../samples-lottie/v4.lottie_test.json" },
        { name: "Sample 5",  path: "../samples-lottie/v5.lottie_test.json" },
        { name: "Sample 6",  path: "../samples-lottie/sample5.json"  },
        { name: "Sample 7",  path: "../samples-lottie/sample6.json"  },
        { name: "Sample 8",  path: "../samples-lottie/sample7.json"  },
        { name: "Sample 9",  path: "../samples-lottie/sample8.json"  },
        { name: "Sample 10", path: "../samples-lottie/sample9.json"  },
        { name: "Sample 11", path: "../samples-lottie/sample4.json"  },
        { name: "Sample 12", path: "../samples-lottie/sample3.json"  },
        { name: "Sample 13", path: "../samples-lottie/sample2.json"  },
        { name: "Sample 14", path: "../samples-lottie/sample12.json" },
        { name: "Sample 15", path: "../samples-lottie/sample11.json" },
        { name: "Sample 16", path: "../samples-lottie/sample1.json" },

    ];

    const grid           = document.getElementById('grid');
    const optimizeAllBtn = document.getElementById('optimizeAllBtn');

    files.forEach((f, i) => {
        const card = document.createElement('div');
        card.className = 'cmp-card';
        card.innerHTML = `
            <div class="cmp-viewer">
                <div id="viewer-${i}" style="width:100%;height:100%"></div>
            </div>
            <div class="cmp-info">
                <div class="cmp-name">${f.name}</div>
                <div class="cmp-result" id="result-${i}"></div>
            </div>`;
        grid.appendChild(card);
        lottie.loadAnimation({
            container: document.getElementById(`viewer-${i}`),
            renderer:  'canvas',
            loop:      true,
            autoplay:  true,
            path:      f.path,
        });
    });

    optimizeAllBtn.addEventListener('click', async () => {
        optimizeAllBtn.disabled    = true;
        optimizeAllBtn.textContent = 'Идёт оптимизация всех анимаций...';
        await Promise.all(files.map((f, i) => optimizeSingle(i, f)));
        optimizeAllBtn.textContent = 'Все анимации оптимизированы!';
    });

    async function optimizeSingle(i, f) {
        const resultDiv = document.getElementById(`result-${i}`);
        resultDiv.textContent = 'Оптимизация...';

        try {
            const resp       = await fetch(f.path);
            const blob       = await resp.blob();
            const beforeSize = blob.size;

            let data;
            if (f.path.endsWith('.lottie')) {
                const parsed = await Optimizer.parseLottieInput(blob);
                data = parsed.data;
            } else {
                data = JSON.parse(await blob.text());
            }

            const result = await Optimizer.run(data, {
                quality:        0.8,
                convertToVideo: true,
                worker:         false,
            });

            const beforeMB = (beforeSize / (1024 * 1024)).toFixed(2);
            const afterMB  = (result.lottie.size / (1024 * 1024)).toFixed(2);
            const percent  = Math.round((1 - result.lottie.size / beforeSize) * 100);

            resultDiv.innerHTML = `
                <div class="cmp-metric before">
                    <span>Размер до</span>
                    <strong>${beforeMB} MB</strong>
                </div>
                <div class="cmp-metric after">
                    <span>Размер после</span>
                    <strong>${afterMB} MB</strong>
                </div>
                <div class="cmp-metric compress">
                    <span>Сжатие</span>
                    <strong>${percent}%</strong>
                </div>`;

        } catch (err) {
            console.error(err);
            resultDiv.textContent = 'Ошибка';
        }
    }
</script>
</body>
</html>
