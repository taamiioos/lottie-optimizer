<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lottie Плеер</title>
    <link rel="stylesheet" href="./styles/optimizer.css">
    <link rel="stylesheet" href="./styles/player.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" defer></script>
    <script src="https://unpkg.com/mp4box@0.5.2/dist/mp4box.all.min.js" defer></script>
    <script type="module" src="./player-app.js"></script>
</head>
<body>
<main class="pl-app">
    <nav class="pl-nav">
        <a href="../demo/optimizer.html" class="nav-btn-secondary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10"/>
            </svg>
            Lottie Optimizer
        </a>
        <h1 class="pl-title">Lottie Плеер</h1>
        <div class="app-header-nav-player">
            <button class="tool-reset-btn" id="btnReset">
                Сбросить
            </button>
            <a href="./video-to-lottie.html" class="nav-btn-secondary">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="6" width="15" height="12" rx="2"/>
                    <path d="M17 9l5-3v12l-5-3"/>
                </svg>
                Video to Lottie
            </a>
        </div>
    </nav>
    <section class="pl-howto">
        <div class="pl-steps-row">
            <div class="pl-step">
                <div class="pl-step-num">1</div>
                <div class="pl-step-text">
                    <strong>optimized.json</strong>
                    <span>скачайте в оптимизаторе</span>
                </div>
            </div>
            <div class="pl-step-arrow">→</div>
            <div class="pl-step">
                <div class="pl-step-num">2</div>
                <div class="pl-step-text">
                    <strong>assets.zip</strong>
                    <span>скачайте в оптимизаторе</span>
                </div>
            </div>
            <div class="pl-step-arrow">→</div>
            <div class="pl-step">
                <div class="pl-step-num">3</div>
                <div class="pl-step-text">
                    <strong>Воспроизвести</strong>
                    <span>смотрите анимацию</span>
                </div>
            </div>
        </div>
    </section>
    <section class="pl-upload-card">
        <input type="file" id="jsonInput" accept=".json" hidden>
        <input type="file" id="zipInput" accept=".zip" hidden>
        <div class="pl-zones">
            <div class="pl-zone" id="zoneJson">
                <span class="pl-zone-label">JSON файл</span>
                <span class="pl-zone-hint" id="jsonHint">optimized.json</span>
                <span class="pl-zone-size" id="jsonSize" style="display:none"></span>
            </div>
            <div class="pl-zone-divider"></div>
            <div class="pl-zone" id="zoneZip">
                <span class="pl-zone-label">ZIP архив</span>
                <span class="pl-zone-hint" id="zipHint">assets.zip</span>
                <span class="pl-zone-size" id="zipSize" style="display:none"></span>
            </div>
        </div>
        <div class="pl-footer">
            <button class="pl-play-btn" id="btnPlay" disabled>
                <span class="pl-play-icon">▶</span>
                <span>Воспроизвести</span>
            </button>
            <div class="pl-footer-mid">
                <div class="progressBarTrack">
                    <div class="progressBarFill" id="progressFill"></div>
                </div>
                <div class="progressText" id="progressLabel"></div>
            </div>
        </div>
    </section>
    <div class="pl-content">
        <div class="pl-left">
            <div class="pl-player-wrap" id="playerWrap" style="display:none">
                <div id="player"></div>
                <div class="pl-placeholder" id="playerPlaceholder">
                    <span class="pl-placeholder-icon">▶</span>
                    <span class="pl-placeholder-text">Загрузи файлы и нажми воспроизвести</span>
                </div>
            </div>
            <div class="pl-controls" id="playerControls" style="display:none">
                <div class="pl-scrubber-row">
                    <span class="pl-frame-label" id="frameInfo">—</span>
                    <input type="range" class="pl-scrubber" id="scrubber" min="0" max="100" value="0" step="1">
                </div>
                <div class="pl-ctrl-row">
                    <button class="pl-ctrl-btn pl-ctrl-stop" id="btnStop" title="В начало">■</button>
                    <button class="pl-ctrl-btn pl-ctrl-playpause" id="btnPause">⏸</button>
                    <div class="pl-ctrl-gap"></div>
                    <select class="pl-speed-sel" id="speedSelect" title="Скорость воспроизведения">
                        <option value="0.5">0.5×</option>
                        <option value="1" selected>1×</option>
                        <option value="1.5">1.5×</option>
                        <option value="2">2×</option>
                    </select>
                    <button class="pl-ctrl-btn pl-ctrl-loop active" id="btnLoop">↺</button>
                </div>
            </div>
        </div>
        <div class="pl-bottom">
            <div class="demoStats" id="statsSection" style="display:none"></div>
        </div>
    </div>
</main>
</body>
</html>
